name: Deploy to Vercel

on:
  push:
    branches: [main]
  # 每天北京时间 8:00 和 20:30 自动抓取新内容并部署
  schedule:
    - cron: '0 0 * * *'    # 每天 00:00 UTC = 北京时间 08:00
    - cron: '30 12 * * *'   # 每天 12:30 UTC = 北京时间 20:30
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 中国 RSS 源在美国 runner 可能无法访问，用 || true 确保不阻断构建
      - name: Fetch RSS articles
        run: node src/scripts/fetchHotTopics.js 30 || true

      - name: Generate content
        run: npm run generate

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
